name: CI
on:
  push:
    branches: ["main"]
jobs:
  build:
    runs-on: "ubuntu-latest"
    steps:
      - name: Отримання коду
        uses: actions/checkout@v5
      - name: Ініціалізація Python
        uses: actions/setup-python@5
        with:
          python-version: "3.10.4"
      - name: Тестування
        run: python main.py
      
